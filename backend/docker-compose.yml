version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reddit-investigator-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB:-SimLLP}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - chroma
    restart: always

  chroma:
    image: chromadb/chroma:latest
    container_name: reddit-investigator-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: always

volumes:
  chroma_data:
