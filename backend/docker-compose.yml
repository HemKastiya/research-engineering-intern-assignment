version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reddit-investigator-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB:-SimLLP}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - PINECONE_INDEX_HOST=${PINECONE_INDEX_HOST}
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-reddit_posts}
      - PINECONE_CLOUD=${PINECONE_CLOUD}
      - PINECONE_REGION=${PINECONE_REGION}
      - PINECONE_AUTO_CREATE=${PINECONE_AUTO_CREATE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: always
